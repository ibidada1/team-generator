<!-- file: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Team Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center; /* center vertically */
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding:16px;
}

/* 📱 On small screens → allow scroll instead of forced center */
@media (max-width: 500px){
  body{
    align-items:flex-start;
  }
}

/* APP CONTAINER */
.app{
  width:100%;
  max-width:600px; /* responsive instead of fixed 900px */
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* TITLE */
h1{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
  font-size:clamp(20px,5vw,28px);
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.team-controls{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

/* INPUTS */
input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:16px;
}

/* BUTTONS */
button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:#ff7a18;
  color:white;
  transition:0.2s;
  white-space:nowrap;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,0.3);
}

/* PLAYER LIST */
.players{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:15px;
}

.player-chip{
  background:rgba(255,255,255,0.2);
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}

/* TEAMS GRID */
.teams{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

/* TEAM CARD */
.team-card{
  background:rgba(255,255,255,0.15);
  border-radius:15px;
  padding:12px;
}

.team-title{
  font-weight:600;
  margin-bottom:8px;
}

.team-player{
  background:rgba(255,255,255,0.25);
  padding:5px 8px;
  border-radius:8px;
  margin-bottom:5px;
  font-size:13px;
}

/* 📱 MOBILE STACK FIX */
@media (max-width: 500px){

  .controls,
  .team-controls{
    flex-direction:column;
  }

  button{
    width:100%;
  }

  input{
    width:100%;
  }

}
</style>
</head>

<body>

<div class="app">

<h1>Imaan's Team Generator</h1>

<div class="controls">
<input id="playerInput" placeholder="Enter player name">
<button onclick="addPlayer()">Add</button>
</div>

<div class="players" id="playerList"></div>

<div class="team-controls">
<input id="teamCount" type="number" value="2" min="1">
<button onclick="generateTeams()">Generate Teams</button>
</div>

<div class="teams" id="teamsContainer"></div>

</div>

<script>

const LOCKED_GROUP=["ibi","raeesa"];

let players=[];

function addPlayer(){

const input=document.getElementById("playerInput");
const name=input.value.trim().toLowerCase();

if(!name) return;

players.push(name);
input.value="";

renderPlayers();
}

function renderPlayers(){

const list=document.getElementById("playerList");
list.innerHTML="";

players.forEach(p=>{
const chip=document.createElement("div");
chip.className="player-chip";
chip.textContent=p;
list.appendChild(chip);
});

}

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
}

function generateTeams(){

const teamCount = parseInt(document.getElementById("teamCount").value);
if(players.length===0 || teamCount<=0) return;

const shuffled=[...players];

const lockedPlayers=shuffled.filter(p=>LOCKED_GROUP.includes(p));
const remaining=shuffled.filter(p=>!LOCKED_GROUP.includes(p));

shuffle(remaining);

const teams=Array.from({length:teamCount},()=>[]);

const baseSize=Math.floor(players.length/teamCount);
const extra=players.length%teamCount;

const teamLimits=[];

for(let i=0;i<teamCount;i++){
teamLimits[i]= i<extra ? baseSize+1 : baseSize;
}

if(lockedPlayers.length>0){

const possibleTeams=teamLimits
.map((limit,index)=>({limit,index}))
.filter(t=>t.limit>=lockedPlayers.length);

const teamIndex=possibleTeams[Math.floor(Math.random()*possibleTeams.length)].index;

teams[teamIndex].push(...lockedPlayers);

}

remaining.forEach(player=>{

for(let i=0;i<teamCount;i++){

if(teams[i].length < teamLimits[i]){

teams[i].push(player);
break;

}

}

});

renderTeams(teams);

}

function renderTeams(teams){

const container=document.getElementById("teamsContainer");
container.innerHTML="";

teams.forEach((team,i)=>{

const card=document.createElement("div");
card.className="team-card";

const title=document.createElement("div");
title.className="team-title";
title.textContent="Team "+(i+1);

card.appendChild(title);

team.forEach(player=>{
const p=document.createElement("div");
p.className="team-player";
p.textContent=player;
card.appendChild(p);
});

container.appendChild(card);

});

}

</script>

</body>
</html>
